<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contífico → Odoo | API Tester</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>API Tester · Contífico → Odoo</h1>
      <p class="lead">Página para probar todos los métodos de la API usando OpenAPI automáticamente.</p>

      <section class="card">
        <h2>Configuración</h2>
        <label>Base URL API</label>
        <input id="baseUrl" value="http://localhost:8000" />
        <label>Token Bearer (opcional)</label>
        <input id="token" placeholder="eyJ..." />
        <button id="loadOpenApi">Cargar métodos desde /openapi.json</button>
      </section>

      <section class="card">
        <h2>Ejecutar request</h2>
        <label>Método detectado</label>
        <select id="endpointSelect"></select>
        <div class="row">
          <div>
            <label>Método</label>
            <input id="method" />
          </div>
          <div>
            <label>Path</label>
            <input id="path" />
          </div>
        </div>
        <label>Query params (JSON)</label>
        <textarea id="query">{}</textarea>
        <label>Headers extra (JSON)</label>
        <textarea id="headers">{}</textarea>
        <label>Body (JSON)</label>
        <textarea id="body">{}</textarea>
        <div class="actions">
          <button id="sendBtn">Enviar</button>
          <button id="curlBtn" class="secondary">Copiar cURL</button>
        </div>
      </section>

      <section class="card">
        <h2>Respuesta</h2>
        <p id="status" class="status"></p>
        <pre id="response"></pre>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
